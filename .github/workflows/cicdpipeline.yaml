name: DevSecOps Pipeline

on:
  push:
    branches: [main]

jobs:
  # COMBINE scans into one "Security & Quality" job to save setup time
  analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Code Quality (Checkstyle)
        run: mvn checkstyle:check
        
      - name: Unit Tests & Coverage (JaCoCo)
        run: mvn clean verify -Dmaven.test.skip=true --no-transfer-progress
        
      - name: Security Scan (OWASP)
        run: mvn dependency-check:check

      - name: Generate SBOM (CycloneDX)
        run: mvn cyclonedx:makeBom

      # Upload all reports at once
      - name: Upload Reports
        if: always() # Upload even if a check fails
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            target/site/jacoco/
            target/dependency-check-report.html
            target/bom.json

  build:
    runs-on: ubuntu-latest
    needs: analysis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
      
      # Use -DskipTests because they already passed in the 'analysis' job
      - name: Package JAR
        run: mvn package -DskipTests
